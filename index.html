<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant Room — Three.js</title>
    <style>
      /**
       * Full-viewport “device frame”: black letterboxing simulates a portrait phone.
       * Inner stage keeps 9:16 and stays centered.
       */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
      }

      #device-frame {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
      }

      /* 9:16 portrait canvas area — height-limited on wide screens, width-limited on tall screens */
      #canvas-stage {
        position: relative;
        width: min(100vw, calc(100vh * 9 / 16));
        height: min(100vh, calc(100vw * 16 / 9));
        aspect-ratio: 9 / 16;
        max-width: 100%;
        max-height: 100%;
        background: #111;
      }

      #canvas-stage canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.169.0/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <div id="device-frame">
      <div id="canvas-stage">
        <!-- Renderer appends its canvas here -->
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
